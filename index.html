<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="style.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Karaoke Finder</title>
</head>
<body>
    <div class="controls">

    

    <div class="search-box">
        <input type="text" id="searchInput" placeholder="Search karaoke..." />
        <button onclick="handleSearch()">Search</button>
    </div>
    

    <div class="filter-box">
        <input type="text" id="filterInput" placeholder="Filter (e.g. female)" />
        <button onclick="applyFilter()">Filter</button>
    </div>

    <div class="sort-box">
        <button onclick="sortAZ()">A–Z</button>
        <button onclick="sortZA()">Z–A</button>
    </div>

    </div>
    </div>
    <div id="results" class="grid"></div>
    
    <script src="script.js"></script>
    
</body>
</html>
